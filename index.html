<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>NomDeTom microsite</title>
    <style>
      :root {
        --page-bg: #f7f7f2;
        --panel-bg: #ffffff;
        --text: #1f2520;
        --muted: #5c645d;
        --border: #d9ddd4;
        --accent: #1d6b43;
      }

      :root[data-theme="dark"] {
        --page-bg: #111713;
        --panel-bg: #1a241d;
        --text: #e5efe6;
        --muted: #b2beb4;
        --border: #3a4d40;
        --accent: #81d39d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--page-bg);
        color: var(--text);
        line-height: 1.5;
      }

      main {
        width: min(100%, 60rem);
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
      }

      .top-actions {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .action-btn {
        border: 1px solid var(--border);
        background: var(--panel-bg);
        color: var(--text);
        padding: 0.45rem 0.75rem;
        font: inherit;
        font-size: 0.9rem;
        line-height: 1.2;
        cursor: pointer;
      }

      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      section {
        margin-top: 1rem;
        background: var(--panel-bg);
        border: 1px solid var(--border);
        padding: 1rem;
      }

      h2 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      ul {
        margin: 0;
        padding-left: 1.2rem;
      }

      li + li {
        margin-top: 0.45rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NomDeTom microsite</h1>
      <div class="top-actions">
        <button
          id="toggle-theme-btn"
          class="action-btn"
          type="button"
          aria-pressed="false"
        >
          Theme: Auto
        </button>
      </div>

      <section>
        <h2>Links</h2>
        <p><a href="https://github.com/NomDeTom">github</a></p>
      </section>

      <section>
        <h2>Tiny Calculators</h2>
        <ul>
          <li><a href="solar-panel-sense-checker.html">Solar Panel Sense Checker</a></li>
          <li><a href="voltage-divider-calculator.html">Voltage Divider Calculator</a></li>
          <li><a href="ohms-law-calculator.html">Ohm's Law Calculator</a></li>
          <li><a href="capacitor-calculator.html">Capacitor Discharge Calculator</a></li>
          <li><a href="battery-runtime-calculator.html">Battery Runtime Calculator</a></li>
        </ul>
      </section>
    </main>

    <script>
      (function () {
        var toggleThemeButton = document.getElementById("toggle-theme-btn");

        var THEME_STORAGE_KEY = "nomdetom-theme-mode";
        var autoThemeMediaQuery = window.matchMedia
          ? window.matchMedia("(prefers-color-scheme: dark)")
          : null;
        var themeMode = "auto";

        function capitalizeWord(value) {
          return value.charAt(0).toUpperCase() + value.slice(1);
        }

        function getStoredThemeMode() {
          var stored = localStorage.getItem(THEME_STORAGE_KEY);
          if (stored === "light" || stored === "dark" || stored === "auto") {
            return stored;
          }
          return "auto";
        }

        function getResolvedTheme(mode) {
          if (mode === "auto") {
            return autoThemeMediaQuery && autoThemeMediaQuery.matches
              ? "dark"
              : "light";
          }
          return mode === "dark" ? "dark" : "light";
        }

        function getNextThemeMode(mode) {
          if (mode === "light") return "dark";
          if (mode === "dark") return "auto";
          return "light";
        }

        function updateThemeButton(mode) {
          toggleThemeButton.textContent = "Theme: " + capitalizeWord(mode);
          toggleThemeButton.setAttribute(
            "aria-label",
            "Theme mode " + mode + ". Activate to switch mode.",
          );
        }

        function applyThemeMode(mode, shouldPersist) {
          themeMode =
            mode === "light" || mode === "dark" || mode === "auto"
              ? mode
              : "auto";
          var resolved = getResolvedTheme(themeMode);
          document.documentElement.setAttribute("data-theme", resolved);
          toggleThemeButton.setAttribute(
            "aria-pressed",
            themeMode === "dark" ? "true" : "false",
          );
          updateThemeButton(themeMode);

          if (shouldPersist) {
            localStorage.setItem(THEME_STORAGE_KEY, themeMode);
          }
        }

        toggleThemeButton.addEventListener("click", function () {
          applyThemeMode(getNextThemeMode(themeMode), true);
        });

        if (autoThemeMediaQuery) {
          if (autoThemeMediaQuery.addEventListener) {
            autoThemeMediaQuery.addEventListener("change", function () {
              if (themeMode === "auto") {
                applyThemeMode("auto", false);
              }
            });
          } else if (autoThemeMediaQuery.addListener) {
            autoThemeMediaQuery.addListener(function () {
              if (themeMode === "auto") {
                applyThemeMode("auto", false);
              }
            });
          }
        }

        applyThemeMode(getStoredThemeMode(), false);
      })();
    </script>
  </body>
</html>
